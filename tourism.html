<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Ride Tourism — CRM (прототип)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#efefef;
  --text:#111;--text2:#555;--text3:#999;
  --border:#e0e0e0;--border2:#ccc;
  --accent:#0d9e75;--accent-h:#0b8a65;--accent-l:#e6f9f3;--accent-t:#0b6e50;
  --warn:#e8a33d;--warn-l:#3a2e16;--danger:#e25563;--danger-l:#3a1a1f;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#161616;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --border:#2e2e2e;--border2:#3a3a3a;
  --accent-l:#0d3d2c;--accent-t:#3dd9a4;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:60px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;flex-shrink:0;gap:4px}
.logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:#fff;font-size:18px}
.ni{width:40px;height:40px;border:none;background:none;color:var(--text3);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:.15s}
.ni:hover{background:var(--bg2);color:var(--text2)}
.ni.active{background:var(--accent-l);color:var(--accent)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.topbar h1{font-size:18px;font-weight:700}
.topbar .sub{font-size:12px;color:var(--text3)}
.company-switch{margin-left:auto;display:flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px}
.company-switch:hover{background:var(--bg2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}

.content{padding:20px;overflow-y:auto;flex:1}

/* Tabs */
.board-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.date-filter{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.df-btn{padding:6px 14px;font-size:13px;background:var(--bg);border:1px solid var(--border2);border-radius:20px;cursor:pointer;color:var(--text2)}
.df-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.df-pick{padding:5px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none}
.df-pick:focus{border-color:var(--accent)}
.tab-btn{padding:8px 14px;font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px;font-weight:500}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-add{padding:8px 14px;font-size:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500}
.btn-add:hover{background:var(--accent-h)}
.btn-sec{padding:8px 14px;font-size:13px;background:var(--bg);color:var(--text2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500}

/* New orders alert zone */
.alert-zone{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--danger);border-radius:var(--r);padding:14px;margin-bottom:18px}
.alert-zone.empty{border-left-color:var(--accent);opacity:.7}
.alert-hdr{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:10px}
.alert-hdr .badge{background:var(--danger);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px}
.alert-hdr.ok .badge{background:var(--accent)}
.new-cards{display:flex;gap:10px;flex-wrap:wrap}
.free-zone{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:16px}
.free-hdr{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:10px}
.free-hdr i{color:var(--accent)}
.badge.free{background:var(--accent-l);color:var(--accent-t)}
.free-cards{display:flex;gap:8px;flex-wrap:wrap}
.free-chip{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px}
.free-chip .dot{width:8px;height:8px;border-radius:50%}
.free-chip .car{color:var(--text3);font-size:12px}
.free-none{font-size:13px;color:var(--text2)}
.new-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;min-width:200px;max-width:260px}
.new-card .nm{font-weight:600;font-size:14px}
.new-card .meta{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.new-card .acts{display:flex;gap:6px;margin-top:8px}
.mini-btn{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer}
.mini-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Driver lanes board */
.lanes{display:flex;flex-direction:column;gap:14px}
.lane{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.lane-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.lane-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lane-driver{font-weight:700;font-size:14px}
.lane-car{font-size:12px;color:var(--text3)}
.lane-phone{font-size:12px;color:var(--text3);margin-left:auto}
.lane-count{font-size:12px;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:20px}
.lane-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.lane-empty{color:var(--text3);font-size:12px;font-style:italic;padding:6px 0}

/* Trip row */
.trip{display:flex;align-items:center;gap:12px;padding:10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2)}
.trip .client{font-weight:600;font-size:14px;min-width:120px}
.trip .times{display:flex;gap:14px;flex:1;flex-wrap:wrap}
.trip .tm{font-size:13px}
.trip .tm .lbl{font-size:10px;color:var(--text3);display:block}
.trip .tm .val{font-weight:600}
.trip .tm .val.morning{color:#e8a33d}
.trip .tm .val.day{color:#0d9e75}
.trip .tm .val.evening{color:#5b8fd6}
.trip .addr{font-size:12px;color:var(--text2);flex:1;min-width:140px}
.trip .ph{font-size:12px;color:var(--text3)}
.trip .st{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.st.new{background:var(--danger-l);color:var(--danger)}
.st.assigned{background:var(--warn-l);color:var(--warn)}
.st.confirmed{background:var(--accent-l);color:var(--accent-t)}
.st.done{background:var(--bg3);color:var(--text3)}
.trip .row-acts{display:flex;gap:5px}

/* Status columns board */
.cols{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
.col{flex:1;min-width:240px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rl)}
.col-hdr{padding:12px 14px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.ocard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px}
.ocard .nm{font-weight:600;font-size:14px}
.ocard .meta{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.6}
.ocard .drv{font-size:11px;color:var(--accent-t);margin-top:5px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:22px;width:480px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;margin-bottom:16px}
.field-row{margin-bottom:12px}
.field-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field-row input,.field-row select,.field-row textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{border-color:var(--accent);outline:none}
.field-2{display:flex;gap:10px}
.field-2>div{flex:1}
.field-3{display:flex;gap:8px}
.field-3>div{flex:1}
.slot-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px}
.slot-block-h{font-weight:700;font-size:13px;margin-bottom:8px}
.reg-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:14px;cursor:pointer}
.reg-check input{width:16px;height:16px;accent-color:var(--accent)}
.reg-badge{display:inline-block;font-size:10px;font-weight:600;color:var(--accent-t);background:var(--accent-l);border-radius:10px;padding:1px 7px;margin-left:6px}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state i{font-size:40px;display:block;margin-bottom:10px;opacity:.5}

@media(max-width:768px){
  .trip{flex-wrap:wrap}
  .content{padding:12px}
}

/* page title */
.page-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.page-head .ttl{font-size:16px;font-weight:700}
.page-head .spacer{flex:1}

/* stat cards */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;flex:1;min-width:150px}
.stat .lbl{font-size:12px;color:var(--text3)}
.stat .num{font-size:28px;font-weight:700;margin-top:4px}
.stat .num.warn{color:var(--warn)}
.stat .num.danger{color:var(--danger)}
.stat .num.ok{color:var(--accent)}
.stat .sub{font-size:11px;color:var(--text3);margin-top:2px}

/* generic table */
.tbl{width:100%;border-collapse:collapse;background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.tbl th{text-align:left;font-size:11px;color:var(--text3);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg2)}
.dotc{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.entity-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.entity-card .ec-top{display:flex;align-items:center;gap:8px}
.entity-card .ec-name{font-weight:700;font-size:15px}
.entity-card .ec-meta{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.7}
.entity-card .ec-acts{display:flex;gap:6px;margin-top:10px}
.info-banner{background:var(--accent-l);color:var(--accent-t);border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:16px;display:flex;gap:8px;align-items:center}
.set-row{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.set-row .si{font-size:20px;color:var(--accent)}
.set-row .st-txt{flex:1}
.set-row .st-txt .t{font-weight:600;font-size:13px}
/* ─── Воронка (как доска задач в app.html) ─── */
.board-wrap{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;-webkit-overflow-scrolling:touch;align-items:flex-start}
.board-wrap::-webkit-scrollbar{height:6px}
.board-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.board-col{flex-shrink:0;width:300px;display:flex;flex-direction:column}
.board-col-hdr{display:flex;align-items:center;gap:6px;padding:10px 12px;background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;border:1px solid var(--border);border-bottom:none}
.board-col-title{font-size:13px;font-weight:600;flex:1}
.board-col-count{background:var(--border2);color:var(--text2);font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.board-col-body{flex:1;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rl) var(--rl);padding:8px;display:flex;flex-direction:column;gap:8px;min-height:180px;transition:background .15s}
.board-col-body.drag-over{background:var(--accent-l);border-color:var(--accent)}
.board-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:grab;transition:box-shadow .15s,opacity .15s;position:relative;user-select:none}
.board-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.board-card.dragging{opacity:.4;cursor:grabbing;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.board-card-line{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.board-card-title{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.4;padding-right:54px}
.board-card-meta{font-size:11px;color:var(--text2);line-height:1.6;word-break:break-word}
.board-card-req{font-size:11px;color:var(--text);background:var(--bg2);border-radius:6px;padding:5px 7px;margin-top:6px}
.board-card-actions{position:absolute;top:6px;right:6px;display:none;gap:2px}
.board-card:hover .board-card-actions{display:flex}
.card-action-btn{background:var(--bg2);border:none;border-radius:4px;padding:3px 5px;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.card-action-btn:hover{background:var(--border);color:var(--text)}
.card-action-btn.go:hover{background:var(--accent);color:#fff}
.card-action-btn.del:hover{background:var(--danger);color:#fff}
.board-add-card{padding:8px 12px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--text3);text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;width:100%}
.board-add-card:hover{background:var(--bg);color:var(--accent);border-color:var(--accent)}
.board-card.unassigned{border-color:var(--danger)}
.free-card{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.free-card .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.free-card .fd-name{font-weight:600;font-size:13px}
.free-card .fd-car{font-size:11px;color:var(--text3)}
.slot-time{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.slot-driver{width:100%;margin-top:8px;padding:6px 8px;font-size:12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none;cursor:pointer}
.slot-driver:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><i class="ti ti-plane-tilt"></i></div>
  <button class="ni active" id="nav-board" title="Доска заявок" onclick="goPage('board')"><i class="ti ti-layout-board"></i></button>
  <button class="ni" id="nav-funnel" title="Воронка заявок" onclick="goPage('funnel')"><i class="ti ti-inbox"></i></button>
  <button class="ni" id="nav-dashboard" title="Дашборд" onclick="goPage('dashboard')"><i class="ti ti-layout-dashboard"></i></button>
  <button class="ni" id="nav-clients" title="Клиенты" onclick="goPage('clients')"><i class="ti ti-users"></i></button>
  <button class="ni" id="nav-drivers" title="Водители" onclick="goPage('drivers')"><i class="ti ti-steering-wheel"></i></button>
  <button class="ni" id="nav-cars" title="Машины" onclick="goPage('cars')"><i class="ti ti-car"></i></button>
  <button class="ni" id="nav-finance" title="Финансы" onclick="goPage('finance')"><i class="ti ti-cash"></i></button>
  <button class="ni" id="nav-settings" title="Настройки" onclick="goPage('settings')"><i class="ti ti-settings"></i></button>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Доска заявок</h1>
      <div class="sub">Mr Ride Tourism · трансферы</div>
    </div>
    <div class="company-switch">
      <i class="ti ti-plane-tilt" style="color:var(--accent)"></i>
      <span>Mr Ride Tourism</span>
      <i class="ti ti-chevron-down" style="font-size:14px;color:var(--text3)"></i>
    </div>
    <div class="avatar">MR</div>
  </div>

  <div class="content">
    <!-- PAGE: BOARD -->
    <div class="page" id="page-board">
    <div class="board-tabs">
      <button class="tab-btn active" id="tabLanes" onclick="switchBoard('lanes')"><i class="ti ti-clock"></i> По времени</button>
      <button class="tab-btn" id="tabCols" onclick="switchBoard('cols')"><i class="ti ti-columns"></i> По статусам</button>
      <div style="flex:1"></div>
      <button class="btn-sec" onclick="seedDemo()"><i class="ti ti-flask"></i> Демо-данные</button>
      <button class="btn-sec" onclick="clearAllOrders()"><i class="ti ti-trash"></i> Очистить всё</button>
      <button class="btn-add" onclick="openOrderModal()"><i class="ti ti-plus"></i> Новая заявка</button>
    </div>

    <!-- Date filter -->
    <div class="date-filter" id="dateFilter">
      <button class="df-btn active" data-df="all" onclick="setBoardDate('all')">Все</button>
      <button class="df-btn" data-df="today" onclick="setBoardDate('today')">Сегодня</button>
      <button class="df-btn" data-df="tomorrow" onclick="setBoardDate('tomorrow')">Завтра</button>
      <input type="date" id="dfPick" class="df-pick" onchange="setBoardDate(this.value)">
    </div>

    <!-- Board: driver lanes -->
    <div id="boardLanes" class="lanes"></div>
    <!-- Board: status columns -->
    <div id="boardCols" class="cols" style="display:none"></div>
    </div><!-- /page-board -->

    <!-- PAGE: FUNNEL (воронка заявок) -->
    <div class="page" id="page-funnel" style="display:none">
      <div class="board-tabs">
        <div class="info-banner" style="margin:0;flex:1"><i class="ti ti-info-circle"></i> Входящие заявки. Когда сделка — нажмите «В работу» и заявка уйдёт на доску по водителям.</div>
        <button class="btn-sec" onclick="seedFunnelDemo()"><i class="ti ti-flask"></i> Демо-лиды</button>
        <button class="btn-add" onclick="openLeadModal()"><i class="ti ti-plus"></i> Новая заявка</button>
      </div>
      <div id="funnelCols" class="board-wrap"></div>
    </div><!-- /page-funnel -->

    <!-- PAGE: DASHBOARD -->
    <div class="page" id="page-dashboard" style="display:none"></div>

    <!-- PAGE: CLIENTS -->
    <div class="page" id="page-clients" style="display:none"></div>

    <!-- PAGE: DRIVERS -->
    <div class="page" id="page-drivers" style="display:none"></div>

    <!-- PAGE: CARS -->
    <div class="page" id="page-cars" style="display:none"></div>

    <!-- PAGE: FINANCE -->
    <div class="page" id="page-finance" style="display:none"></div>

    <!-- PAGE: SETTINGS -->
    <div class="page" id="page-settings" style="display:none"></div>
  </div>
</div>

<!-- Lead modal (воронка) -->
<div class="modal-bg" id="leadModal">
  <div class="modal">
    <h2 id="leadModalTitle">Новая заявка</h2>
    <div class="field-row">
      <label>Имя клиента</label>
      <input id="l_client" placeholder="Например: Anton">
    </div>
    <div class="field-row">
      <label>Телефон</label>
      <input id="l_phone" placeholder="+971 ...">
    </div>
    <div class="field-row">
      <label>Запрос клиента</label>
      <textarea id="l_request" rows="3" placeholder="Что просил клиент (текст заявки)"></textarea>
    </div>
    <div class="field-row">
      <label>Дата поездки</label>
      <input id="l_date" type="date">

function driverById(id){ return DRIVERS.find(function(d){return d.id===id;}); }

// ─────────── ФИЛЬТР ПО ДАТЕ (доска заявок) ───────────
function dateStr(off){ var d=new Date(); d.setDate(d.getDate()+(off||0)); var m=('0'+(d.getMonth()+1)).slice(-2); var dd=('0'+d.getDate()).slice(-2); return d.getFullYear()+'-'+m+'-'+dd; }
function resolveBoardDate(){ if(boardDate==='all')return null; if(boardDate==='today')return dateStr(0); if(boardDate==='tomorrow')return dateStr(1); return boardDate; }
function dateMatch(o){ var t=resolveBoardDate(); if(!t)return true; return (o.trip_date||'')===t; }
function setBoardDate(v){
  boardDate=v;
  document.querySelectorAll('#dateFilter .df-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-df')===v); });
  if(v==='all'||v==='today'||v==='tomorrow'){ var p=document.getElementById('dfPick'); if(p)p.value=''; }
  render();
}

function render(){
  if(board==='lanes') renderLanes(); else renderCols();
}

// собрать все «поездки-слоты» из сделок (по дате)
function allSlotTrips(){
  var deals=dealOrders().filter(dateMatch);
  var slots=[
    {key:'morning', dkey:'dM', fk:'fM', tk:'tM', title:'Утро',  line:'#e8a33d'},
    {key:'day',     dkey:'dD', fk:'fD', tk:'tD', title:'День',  line:'#0d9e75'},
    {key:'evening', dkey:'dE', fk:'fE', tk:'tE', title:'Вечер', line:'#5b8fd6'},
  ];
  var out=[];
  deals.forEach(function(o){
    slots.forEach(function(s){
      if(o[s.key]) out.push({o:o, s:s, time:o[s.key], driver:o[s.dkey]||''});
    });
  });
  return out;
}

function timeToMin(t){
  if(!t) return 9999;
  var p=String(t).split(':'); var h=parseInt(p[0],10)||0; var m=parseInt(p[1],10)||0;
  return h*60+m;
}

function renderLanes(){
  var box=document.getElementById('boardLanes');
  var all=allSlotTrips();
  var unassigned=all.filter(function(t){return !t.driver;}).sort(function(a,b){return timeToMin(a.time)-timeToMin(b.time);});
  // занятые водители (для колонки «Свободные»)
  var busy={}; all.forEach(function(t){ if(t.driver) busy[t.driver]=true; });
  var free=DRIVERS.filter(function(d){return !busy[d.id];});

  var cols='';
  // 1. Слоты без водителя
  cols+='<div class="board-col" style="width:300px">'+
    '<div class="board-col-hdr" style="background:#fcebeb;border-color:#e74c3c"><span class="board-col-title">Слоты без водителя</span><span class="board-col-count">'+unassigned.length+'</span></div>'+
    '<div class="board-col-body" style="background:#fcebeb33">'+
      (unassigned.length?unassigned.map(slotTripCard).join(''):'<div class="lane-empty">Все назначены 👍</div>')+
    '</div>'+
  '</div>';
  // 2. Свободные водители
  cols+='<div class="board-col" style="width:220px">'+
    '<div class="board-col-hdr"><span class="board-col-title">Свободные водители</span><span class="board-col-count">'+free.length+'</span></div>'+
    '<div class="board-col-body">'+
      (free.length?free.map(function(d){
        return '<div class="free-card"><span class="dot" style="background:'+d.color+'"></span><div><div class="fd-name">'+esc(d.name)+'</div><div class="fd-car">'+esc(d.car)+'</div></div></div>';
      }).join(''):'<div class="lane-empty">Все заняты</div>')+
    '</div>'+
  '</div>';
  // 3-5. Утро / День / Вечер (только назначенные)
  var slots=[
    {key:'morning', line:'#e8a33d', title:'Утро'},
    {key:'day',     line:'#0d9e75', title:'День'},
    {key:'evening', line:'#5b8fd6', title:'Вечер'},
  ];
  slots.forEach(function(s){
    var trips=all.filter(function(t){return t.s.key===s.key && t.driver;}).sort(function(a,b){return timeToMin(a.time)-timeToMin(b.time);});
    cols+='<div class="board-col" style="width:280px">'+
      '<div class="board-col-hdr"><span class="board-col-title" style="color:'+s.line+'">'+s.title+'</span><span class="board-col-count">'+trips.length+'</span></div>'+
      '<div class="board-col-body">'+
        (trips.length?trips.map(slotTripCard).join(''):'<div class="lane-empty">Нет поездок</div>')+
      '</div>'+
    '</div>';
  });
  box.innerHTML='<div class="board-wrap">'+cols+'</div>';
}

// карточка поездки-слота (одна строка расписания клиента)
function slotTripCard(t){
  var o=t.o, s=t.s;
  var did=o[s.dkey]||'';
  var from=o[s.fk]||o.from||'';
  var to=o[s.tk]||o.to||'';
  var opts='<option value="">— водитель —</option>'+DRIVERS.map(function(d){
    return '<option value="'+d.id+'"'+(d.id===did?' selected':'')+'>'+esc(d.name)+' ('+esc(d.car)+')</option>';
  }).join('');
  return '<div class="board-card'+(did?'':' unassigned')+'" style="cursor:default">'+
    '<div class="board-card-line" style="background:'+s.line+'"></div>'+
    '<div class="board-card-actions">'+
      '<button class="card-action-btn" title="Редактировать" onclick="openOrderModal(\''+o.id+'\')"><i class="ti ti-pencil"></i></button>'+
      '<button class="card-action-btn del" title="Удалить заявку" onclick="delOrder(\''+o.id+'\')"><i class="ti ti-x"></i></button>'+
    '</div>'+
    '<div class="slot-time">'+s.title+' · '+esc(t.time)+'</div>'+
    '<div class="board-card-title">'+esc(o.client)+(o.regular?'<span class="reg-badge">пост.</span>':'')+'</div>'+
    '<div class="board-card-meta">'+
      (from?'📍 '+esc(from)+(to?' → '+esc(to):''):'')+
      (o.phone?(from?'<br>':'')+'📞 '+esc(o.phone):'')+
    '</div>'+
    '<select class="slot-driver" onchange="setSlotDriver(\''+o.id+'\',\''+s.dkey+'\',this.value)">'+opts+'</select>'+
  '</div>';
}

async function setSlotDriver(id, dkey, driverId){
  var patch={}; patch[dkey==='dM'?'driver_morning':dkey==='dD'?'driver_day':'driver_evening']=driverId||null;
  // если назначили хоть кого-то — статус «назначена»
  var o=ORDERS.find(function(x){return x.id===id;});
  if(o){
    var anyDriver = (dkey==='dM'?driverId:o.dM) || (dkey==='dD'?driverId:o.dD) || (dkey==='dE'?driverId:o.dE);
    if(o.status==='new' && anyDriver) patch.status='assigned';

  var res = await sb.from('tour_orders').update(patch).eq('id', id);

function renderCols(){
  var box=document.getElementById('boardCols');

    {key:'new',title:'Новые',color:'var(--danger)'},

    {key:'done',title:'Выполнены',color:'var(--text3)'},
  ];
  box.innerHTML=cols.map(function(c){
    var items=ORDERS.filter(function(o){return o.status===c.key && dateMatch(o);});
    return '<div class="col">'+
      '<div class="col-hdr"><span style="color:'+c.color+'">'+c.title+'</span><span class="lane-count">'+items.length+'</span></div>'+
      '<div class="col-body">'+
        (items.length?items.map(function(o){

              (o.from?'📍 '+esc(o.from)+(o.to?' → '+esc(o.to):''):'')+
              ((o.morning||o.day||o.evening)?'<br>🕐 '+esc(o.morning||'—')+' / '+esc(o.day||'—')+' / '+esc(o.evening||'—'):'')+
            '</div>'+
            (drv?'<div class="drv">🚗 '+esc(drv.name)+' · '+esc(drv.car)+'</div>':'')+
          '</div>';
        }).join(''):'<div class="lane-empty">—</div>')+
      '</div>'+
    '</div>';
  }).join('');

// ─────────── ВОРОНКА ЗАЯВОК (kanban с перетаскиванием) ───────────
var dragId = null;

function renderFunnel(){
  var box=document.getElementById('funnelCols');
  if(!box) return;
  var html=FUNNEL_COLS.map(function(c){
    var line=c.color||'#999999';
    var items=ORDERS.filter(function(o){return o.status===c.id;});
    var cards=items.map(function(o){return leadCard(o,line);}).join('');
    return '<div class="board-col">'+
      '<div class="board-col-hdr">'+
        '<span class="board-col-title">'+esc(c.title)+'</span>'+
        '<span class="board-col-count">'+items.length+'</span>'+
        '<button title="Добавить заявку" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 2px;line-height:1" onclick="openLeadModal(null,\''+c.id+'\')">+</button>'+
        '<button title="Удалить колонку" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;line-height:1" onclick="deleteFunnelCol(\''+c.id+'\')">✕</button>'+
      '</div>'+
      '<div class="board-col-body" id="fcol-'+c.id+'" '+
        'ondragover="funnelDragOver(event,\''+c.id+'\')" ondragleave="funnelDragLeave(event)" ondrop="funnelDrop(event,\''+c.id+'\')">'+
        cards+
        '<button class="board-add-card" onclick="openLeadModal(null,\''+c.id+'\')"><i class="ti ti-plus" style="font-size:14px"></i> Добавить заявку</button>'+
      '</div>'+
    '</div>';
  }).join('');
  // кнопка добавления колонки
  html+='<div class="board-col" style="width:200px">'+
    '<button class="board-add-card" style="padding:12px" onclick="addFunnelCol()"><i class="ti ti-plus"></i> Добавить колонку</button>'+
  '</div>';
  box.innerHTML=html;
}

// добавить колонку
async function addFunnelCol(){
  var title=prompt('Название новой колонки:');
  if(!title || !title.trim()) return;
  var id='c'+Date.now();
  var res=await sb.from('tour_funnel_cols').insert({id:id,title:title.trim(),color:'#0d9e75',position:FUNNEL_COLS.length,company_id:'mrride'});
  if(res.error){ alert('Ошибка: '+res.error.message); return; }

// удалить колонку (только пустую)
async function deleteFunnelCol(id){
  var has=ORDERS.some(function(o){return o.status===id;});
  if(has){ alert('В колонке есть заявки — сначала перетащите их в другую колонку.'); return; }
  if(!confirm('Удалить колонку?')) return;
  var res=await sb.from('tour_funnel_cols').delete().eq('id',id);
  if(res.error){ alert('Ошибка: '+res.error.message); return; }
  await loadFunnelCols(); renderFunnel();
}

function leadCard(o,line){
  var go = o.status!=='dead'
    ? '<button class="card-action-btn go" title="Перевести в доску заявок" onclick="convertLead(\''+o.id+'\',event)"><i class="ti ti-arrow-right"></i></button>'
    : '';
  return '<div class="board-card" draggable="true" data-id="'+o.id+'" '+
      'ondragstart="funnelDragStart(event,\''+o.id+'\')" ondragend="funnelDragEnd(event)">'+
    '<div class="board-card-line" style="background:'+line+'"></div>'+
    '<div class="board-card-actions" onclick="event.stopPropagation()">'+go+
      '<button class="card-action-btn" title="Редактировать" onclick="openLeadModal(\''+o.id+'\')"><i class="ti ti-pencil"></i></button>'+
      '<button class="card-action-btn del" title="Удалить" onclick="delOrderEv(\''+o.id+'\',event)"><i class="ti ti-x"></i></button>'+
    '</div>'+
    '<div class="board-card-title">'+esc(o.client)+'</div>'+
    '<div class="board-card-meta">'+
      (o.phone?'📞 '+esc(o.phone):'')+
      (o.trip_date?(o.phone?'<br>':'')+'📅 '+esc(o.trip_date):'')+
    '</div>'+
    (o.request?'<div class="board-card-req">'+esc(o.request)+'</div>':'')+
  '</div>';
}

// drag & drop (как в app.html)
function funnelDragStart(e,id){
  dragId=id; e.dataTransfer.effectAllowed='move';
  var el=e.target; setTimeout(function(){ if(el)el.classList.add('dragging'); },0);
}
function funnelDragEnd(e){
  dragId=null;
  document.querySelectorAll('.board-card').forEach(function(c){c.classList.remove('dragging');});
  document.querySelectorAll('.board-col-body').forEach(function(c){c.classList.remove('drag-over');});
}
function funnelDragOver(e,key){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.board-col-body').forEach(function(c){c.classList.remove('drag-over');});
  var col=document.getElementById('fcol-'+key); if(col)col.classList.add('drag-over');
}
function funnelDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
}
async function funnelDrop(e,toKey){
  e.preventDefault();
  document.querySelectorAll('.board-col-body').forEach(function(c){c.classList.remove('drag-over');});
  if(!dragId) return;
  var id=dragId; dragId=null;
  var o=ORDERS.find(function(x){return x.id===id;});
  if(o && o.status===toKey) return;
  var res = await sb.from('tour_orders').update({status: toKey}).eq('id', id);
  if(res.error){ alert('Ошибка: '+res.error.message); return; }
  loadOrders();
}

// удалить с остановкой всплытия
function delOrderEv(id,e){ if(e) e.stopPropagation(); delOrder(id); }

function openLeadModal(id, presetStatus){
  editingLead = id||null;
  leadPreset = presetStatus || 'inbox';
  document.getElementById('leadModalTitle').textContent = id ? 'Редактировать заявку' : 'Новая заявка';
  var o = id ? ORDERS.find(function(x){return x.id===id;}) : {client:'',phone:'',request:'',trip_date:''};
  document.getElementById('l_client').value=o.client||'';
  document.getElementById('l_phone').value=o.phone||'';
  document.getElementById('l_request').value=o.request||'';
  document.getElementById('l_date').value=o.trip_date||'';
  document.getElementById('leadModal').classList.add('show');
}
function closeLeadModal(){ document.getElementById('leadModal').classList.remove('show'); }

async function saveLead(){
  var client=document.getElementById('l_client').value.trim();
  if(!client){ alert('Введите имя клиента'); return; }
  var data={
    client:client,
    phone:document.getElementById('l_phone').value.trim(),
    request:document.getElementById('l_request').value.trim(),
    trip_date:document.getElementById('l_date').value||null
  };
  var res;
  if(editingLead){
    res = await sb.from('tour_orders').update(data).eq('id', editingLead);
  } else {
    data.status=leadPreset||'inbox'; data.company_id='mrride';
    res = await sb.from('tour_orders').insert(data);
  }
  if(res.error){ alert('Ошибка сохранения: '+res.error.message); return; }
  closeLeadModal(); loadOrders();
}

// сменить стадию в воронке
async function moveLead(id, st){
  var res = await sb.from('tour_orders').update({status: st}).eq('id', id);
  if(res.error){ alert('Ошибка: '+res.error.message); return; }
  loadOrders();
}

// сделка: лид -> на доску по водителям (статус new)
async function convertLead(id,e){
  if(e) e.stopPropagation();

  alert('Заявка передана на доску по водителям (раздел «Доска заявок»). Там назначьте водителя и детали поездки.');
  loadOrders();
}

function renderDashboard(){
  var deals=dealOrders();
  var total=deals.length;
  var newN=deals.filter(function(o){return !o.driver||o.status==='new';}).length;
  var assigned=deals.filter(function(o){return o.status==='assigned';}).length;
  var confirmed=deals.filter(function(o){return o.status==='confirmed';}).length;
  var done=deals.filter(function(o){return o.status==='done';}).length;
  var html='<div class="page-head"><span class="ttl">Сводка на сегодня</span></div>';
  html+='<div class="stats">'+
    statCard('Всего заявок',total,'','')+
    statCard('Без водителя',newN,newN>0?'danger':'ok',newN>0?'требуют назначения':'все назначены')+
    statCard('Назначены',assigned,'warn','ждут подтверждения')+
    statCard('Подтверждены',confirmed,'ok','водитель принял')+
    statCard('Выполнены',done,'','завершено сегодня')+
  '</div>';
  // per-driver load
  html+='<div class="page-head" style="margin-top:8px"><span class="ttl">Загрузка водителей</span></div>';
  html+='<table class="tbl"><thead><tr><th>Водитель</th><th>Машина</th><th>Клиентов сегодня</th><th>Статус</th></tr></thead><tbody>';
  DRIVERS.forEach(function(d){
    var trips=ORDERS.filter(function(o){return o.driver===d.id;});
    var pending=trips.filter(function(o){return o.status==='assigned';}).length;
    html+='<tr><td><span class="dotc" style="background:'+d.color+'"></span>'+esc(d.name)+'</td><td>'+esc(d.car)+'</td><td>'+trips.length+'</td><td>'+(pending>0?'<span style="color:var(--warn)">'+pending+' ждут подтв.</span>':'<span style="color:var(--accent)">всё ок</span>')+'</td></tr>';
  });
  html+='</tbody></table>';
  document.getElementById('page-dashboard').innerHTML=html;
}
function statCard(lbl,num,cls,sub){
